<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Расшифровка — Lecture Decoder</title>
    <style>
        :root {
            --bg-main: #eee9dd;
            --card: rgba(255, 255, 255, 0.58);
            --card-strong: rgba(255, 255, 255, 0.80);
            --text-main: #191919;
            --text-muted: #68645f;
            --border: rgba(35, 35, 35, 0.10);
            --shadow: 0 24px 70px rgba(70, 60, 45, 0.14);
            --shadow-soft: 0 10px 30px rgba(70, 60, 45, 0.10);
            --accent: #7b78d9;
            --accent-soft: rgba(123, 120, 217, 0.18);
            --dark: #191919;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 18% 18%, rgba(255,255,255,0.88), transparent 28%),
                radial-gradient(circle at 82% 24%, rgba(157,151,228,0.28), transparent 24%),
                radial-gradient(circle at 50% 90%, rgba(255,255,255,0.65), transparent 32%),
                var(--bg-main);
        }

        .page {
            width: min(1180px, calc(100% - 48px));
            margin: 32px auto;
            padding-bottom: 50px;
        }

        .topbar {
            position: sticky;
            top: 18px;
            z-index: 20;
            min-height: 70px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            border: 1px solid var(--border);
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.54);
            backdrop-filter: blur(24px);
            box-shadow: var(--shadow-soft);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            letter-spacing: -0.04em;
            font-size: 22px;
            white-space: nowrap;
        }
        .brand-dot {
            width: 58px;
            height: 58px;
            flex: 0 0 58px;
            border-radius: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='512' height='512' viewBox='0 -70 512 582' xmlns='http://www.w3.org/2000/svg'%3E%3Cellipse cx='67' cy='218' rx='61' ry='87' transform='rotate(-10 67 218)' fill='%2307080d'/%3E%3Cellipse cx='174' cy='76' rx='73' ry='108' transform='rotate(2 174 76)' fill='%2307080d'/%3E%3Cellipse cx='338' cy='76' rx='73' ry='108' transform='rotate(-2 338 76)' fill='%2307080d'/%3E%3Cellipse cx='445' cy='218' rx='61' ry='87' transform='rotate(10 445 218)' fill='%2307080d'/%3E%3Cpath d='M256 230C318 230 374 264 411 320C444 370 449 432 421 466C392 502 335 489 292 480C273 476 239 476 220 480C177 489 120 502 91 466C63 432 68 370 101 320C138 264 194 230 256 230Z' fill='%2307080d'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: center;
            background-size: 38px 38px;
            box-shadow: none;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.20));
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 18px;
            border-radius: 999px;
            border: 1px solid rgba(20, 20, 20, 0.08);
            background: rgba(255, 255, 255, 0.72);
            color: #161616;
            text-decoration: none;
            font-weight: 850;
            font-size: 14px;
            line-height: 1;
            box-shadow: 0 8px 20px rgba(50, 45, 35, 0.08);
            white-space: nowrap;
        }
        .button.primary {
            background: #151515;
            color: white;
            border-color: #151515;
        }

        .hero {
            margin-top: 34px;
            padding: 42px;
            border-radius: 42px;
            background:
                radial-gradient(circle at 18% 10%, rgba(255,255,255,0.95), transparent 30%),
                linear-gradient(135deg, rgba(255,255,255,0.78), rgba(255,255,255,0.48));
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            backdrop-filter: blur(20px);
        }

        h1 {
            margin: 0;
            font-size: clamp(34px, 5.2vw, 62px);
            line-height: 0.95;
            letter-spacing: -0.06em;
        }

        .subtitle {
            margin: 14px 0 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.45;
            max-width: 720px;
        }

        .meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 22px;
        }

        .pill {
            display: inline-flex;
            padding: 9px 13px;
            border-radius: 999px;
            background: var(--soft-accent);
            color: var(--accent);
            font-weight: 850;
            font-size: 13px;
        }

        .transcript {
            margin-top: 24px;
            display: grid;
            gap: 12px;
        }

        .block {
            display: grid;
            grid-template-columns: 155px 1fr;
            gap: 22px;
            align-items: start;
            padding: 20px 22px;
            border-radius: 22px;
            background: var(--card-strong);
            border: 1px solid var(--border);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.8),
                0 12px 30px rgba(80, 70, 50, 0.08);
        }

        .time {
            width: fit-content;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(20, 20, 20, 0.9);
            color: #f8f3ea;
            font-family: Menlo, Monaco, Consolas, monospace;
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
        }

        .text {
            margin: 0;
            color: #222;
            font-size: 15.5px;
            line-height: 1.65;
            max-width: 860px;
        }

        .empty {
            margin-top: 24px;
            padding: 24px;
            border-radius: 22px;
            background: var(--card);
            color: var(--muted);
            font-weight: 700;
        }

        @media (max-width: 720px) {
            .page {
                width: min(100% - 24px, 1180px);
            }

            .hero {
                padding: 26px;
                border-radius: 32px;
            }

            .block {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .topbar {
                align-items: flex-start;
                gap: 12px;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header class="topbar">
            <div class="brand">
                <div class="brand-dot"></div>
                <span>Lecture Decoder</span>
            </div>

            <div class="actions">
                <a class="button" href="/">На главную</a>
                <a class="button primary" href="/download/{{ pdf_filename }}" target="_blank">Открыть PDF</a>
            </div>
        </header>

        <section class="hero">
            <h1>Расшифровка</h1>
            <p class="subtitle">{{ source_filename }}</p>

            {% if blocks %}
                <div class="transcript">
                    {% for block in blocks %}
                        <article class="block">
                            <span class="time">{{ block.time_range }}</span>
                            <p class="text">{{ block.text }}</p>
                        </article>
                    {% endfor %}
                </div>
            {% else %}
                <div class="empty">
                    В этой расшифровке пока нет текстовых блоков.
                </div>
            {% endif %}
        </section>
    </main>
</body>
</html>
